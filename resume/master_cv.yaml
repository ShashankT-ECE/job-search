    highlight_bank:
      - id: sih_h1
        tags: [leadership, systems]
        text: "Led a six-member team to design, engineer, and demonstrate an autonomous, solar-powered dewatering solution for mining operations."
      - id: sih_h2
        tags: [iot, systems_integration]
        text: "Engineered an end-to-end solution integrating renewable energy deployment, pumping infrastructure, IIoT-based remote monitoring, and comprehensive operational automation."
      - id: sih_h3
