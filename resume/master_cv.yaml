projects:
  - id: rtl2gds_agent
    name: AI-Driven RTL-to-GDS Agentic Framework (RTL2GDS-Agent)
    links:
      - label: GitHub
        url: https://github.com/ShashankT-ECE/rtl2gds-agent
    highlight_bank:
      - id: r2g_h1
        tags: [langgraph, multi_agent, automation]
        text: "Designed a LangGraph-based multi-agent AI framework automating the full RTL-to-GDS cycle: specification analysis, RTL generation, testbench creation, simulation-driven debugging, logic synthesis, and timing analysis."
      - id: r2g_h2
        tags: [cocotb, closed_loop, verification]
        text: "Implemented a closed-loop verification engine using Cocotb, Icarus Verilog, and Python that autonomously detects simulation failures, diagnoses RTL defects, and generates corrective fixes to minimize manual debug cycles."
      - id: r2g_h3
        tags: [benchmarks, metrics]
        text: "Achieved 25/25 successful benchmark runs and 25/25 successful synthesis runs (100% success rate) across 5 designs including ALU, FIFO, FSM, UART, and APB bus."
      - id: r2g_h4
        tags: [bug_injection, evaluation, metrics]
        text: "Built a bug-injection evaluation suite spanning control, counter, reset, flag-generation, and address-decoding defect categories, achieving 10/10 automatic bug detection and 9/10 automatic single-line RTL repairs through the agentic loop."
      - id: r2g_h5
        tags: [sta, opensta]
        text: "Integrated a Static Timing Analysis (STA) agent utilizing OpenSTA into the active workflow pipeline."
    default_highlights: [r2g_h1, r2g_h2, r2g_h3, r2g_h4]

  - id: pyuvm_framework
    name: pyUVM-Based Verification Automation Framework
    highlight_bank:
      - id: puvm_h1
        tags: [pyuvm, uvm, python]
        text: "Developed a Python-based functional verification automation framework using pyUVM methodology with reusable, UVM-inspired components including sequencers, drivers, monitors, and scoreboards."
      - id: puvm_h2
        tags: [coverage, assertions]
        text: "Targeting coverage-aware, assertion-driven test generation for RTL IP blocks designed to integrate seamlessly into the RTL2GDS-Agent pipeline."
    default_highlights: [puvm_h1, puvm_h2]

  - id: fpga_image_accel
    name: FPGA-Based Image Enhancement Accelerator
    highlight_bank:
      - id: fpga_h1
        tags: [fpga, kria, dpu]
        text: "Developed and deployed an FPGA-accelerated image enhancement system on the Xilinx Kria KV260 platform, running an SRCNN super-resolution model on the onboard DPU for accelerated inference."
      - id: fpga_h2
        tags: [verilog, rtl, preprocessing]
        text: "Designed custom Verilog RTL modules for RGB-to-YCbCr color space conversion, offloading intensive preprocessing algorithms to dedicated FPGA hardware blocks."
      - id: fpga_h3
        tags: [hw_sw_codesign]
        text: "Integrated custom hardware preprocessing with DPU-accelerated model inference using a comprehensive hardware-software co-design methodology."
      - id: fpga_h4
        tags: [award]
        text: "Won First Place at a National AI + FPGA Hackathon for this deployment."
    default_highlights: [fpga_h1, fpga_h2, fpga_h4]

  - id: cmos_logic_design
    name: CMOS Digital Logic Gate Design (Cadence Virtuoso)
    highlight_bank:
      - id: cmos_h1
        tags: [virtuoso, cmos, analog, schematic]
        text: "Designed and simulated CMOS schematics for fundamental building blocks including inverters, NAND, NOR, XOR, 2:1 MUX, pass-transistor logic, and a 4:1 MUX using transmission gates across multiple VLSI coursework labs."
      - id: cmos_h2
        tags: [simulation, waveform, verification]
        text: "Verified correct logic functionality and performance of each design through transient simulation and waveform analysis in Cadence Virtuoso."
    default_highlights: [cmos_h1, cmos_h2]

  - id: sih_dewatering
    name: Solar-Powered Smart Dewatering System (Smart India Hackathon Winner)
    links:
      - label: GitHub
