summary_bank:
  - id: sum_digital_verification
    tags: [rtl, verification, digital, dv, functional_verification]
    text: >
      ECE undergraduate at CBIT Hyderabad (CGPA 9.17) with internship experience
      in RTL Design, Functional Verification, and ASIC Design Flows. Experienced
      in RTL-to-GDSII flows (synthesis, P&R, STA) alongside building hardware
      automation tools and multi-agent AI frameworks for verification. Proven
      first-principles, debug-focused approach using simulation-driven workflows
      and AI-assisted development to accelerate verification methodologies.

  - id: sum_analog_mixed_signal
    tags: [analog, mixed_signal, cmos, device_physics]
    text: >
      Electronics and Communication Engineering undergraduate with coursework
      foundations in MOS Device Physics, Analog Electronics, and Semiconductor/
      CMOS Circuit design, alongside hands-on experience in Digital RTL Design
      and Functional Verification. Hands-on Cadence Virtuoso exposure through
      CMOS digital logic gate design and functional verification labs. Seeking
      to apply a debug-focused, first-principles approach to analog and
      mixed-signal verification challenges.

  - id: sum_physical_design_vlsi
    tags: [physical_design, pnr, sta, synthesis, ASIC]
    text: >
      Electronics and Communication Engineering undergraduate with strong
      foundations in RTL Design, Digital Logic, Functional Verification, and
      Physical Design. Experienced in ASIC design flows from RTL to GDSII,
      including synthesis, place-and-route (P&R), and Static Timing Analysis
      (STA). Passionate about SoC design and VLSI automation, with hands-on
      exposure to Cadence EDA tools, Xilinx FPGA platforms, and Cocotb-based
      verification environments.

  - id: sum_ai_eda_generalist
    tags: [ai, eda, automation, agentic, tooling]
    text: >
      ECE undergraduate (CGPA 9.17) building at the intersection of VLSI and
      AI-driven EDA tooling. Combines RTL design and functional verification
      internship experience with hands-on development of LangGraph-based
      multi-agent frameworks that automate RTL-to-GDS workflows. Comfortable
      operating across the full stack — from Verilog RTL to Python automation
      to LLM-integrated design/verification pipelines.

